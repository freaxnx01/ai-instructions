name: build-stacks-drift

on:
  pull_request:
    paths:
      - '.ai/stacks/**'
      - 'scripts/build-stacks.sh'
      - '.github/workflows/build-stacks-drift.yml'
  push:
    branches: [main]

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate flat stack files
        run: ./scripts/build-stacks.sh

      - name: Fail if generated files drift from sources
        run: |
          if ! git diff --exit-code .ai/stacks/dotnet-*.md; then
            echo "::error::Generated stack files are out of date."
            echo "::error::Edit .ai/stacks/_partials/dotnet-core.md or .ai/stacks/_layers/dotnet-*.md instead,"
            echo "::error::then run scripts/build-stacks.sh and commit the result."
            exit 1
          fi
