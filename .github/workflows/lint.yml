name: lint

# Polyglot lint gate: runs the pre-commit hooks (actionlint, yamllint,
# shellcheck, ruff, markdownlint, hadolint, typos, gitleaks, hygiene) over the
# whole repo. Dogfoods templates/pre-commit/ via the repo-root config.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: python -m pip install --disable-pip-version-check pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
