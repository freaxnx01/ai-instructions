# markdownlint-cli2 config for THIS repo (ai-instructions).
# Seeded from templates/pre-commit/.markdownlint-cli2.yaml, extended with the
# files this repo generates (assembled instruction files + flat stack overlays),
# which are regenerated from source and must not be linted as hand-written docs.
config:
  default: true
  MD013: false   # line length — prose, tables and links run long
  MD033: false   # inline HTML — used for anchors / <details> / comments
  MD041: false   # first line need not be a top-level heading
  MD024:
    siblings_only: true   # repeated headings allowed across different sections
  MD029: false   # ordered-list numbering style is a matter of taste
  MD060: false   # table pipe padding ("compact" style) — too pedantic for prose tables

globs:
  - "**/*.md"

ignores:
  - "CLAUDE.md"
  - "SKILL.md"
  - ".github/copilot-instructions.md"
  - ".ai/stacks/dotnet-*.md"   # generated by scripts/build-stacks.sh
  - ".ai/examples/**"          # committed examples of *assembled* output, not hand-authored
  - "**/node_modules/**"
